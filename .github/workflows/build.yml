name: Buildozer APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Platform Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgomp1
        pip install --upgrade pip setuptools wheel cython buildozer

    - name: Pre-accept Android SDK Licenses
      run: |
        # Buildozer'ın indireceği yere lisans klasörünü önceden oluşturup onayları basıyoruz
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "244d2d049b721474d6bf1b427838a113b5e8ec1d\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb74fa36779d974b96b6\n24333f1a63b68bfa343d305d426a813bf76a8d46\n84831b9409646a547e31e3eff4974d772c58686a\nf991504443f3f31efc260ff12e19ec1152a67425" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

    - name: Build with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FoxBrowser-APK
        path: bin/*.apk
        
